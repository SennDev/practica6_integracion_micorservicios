<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white p-4">
          <h4 class="mb-0 fw-bold">Registro de InscripciÃ³n</h4>
        </div>
        <div class="card-body p-4 bg-white">
          @if (mensajeExito()) {
            <div class="alert alert-success shadow-sm">
              {{ mensajeExito() }}
            </div>
          }

          @if (error()) {
            <div class="alert alert-danger shadow-sm">
              {{ error() }}
            </div>
          }

          <form
            #inscripcionForm="ngForm"
            class="needs-validation"
            (ngSubmit)="enviarInscripcion(inscripcionForm)"
            [class.was-validated]="inscripcionForm.submitted"
          >
            <div class="mb-3">
              <label class="form-label fw-bold">Nombre Completo *</label>
              <input
                type="text"
                class="form-control"
                placeholder="Ingresa tu nombre"
                name="nombreEstudiante"
                [(ngModel)]="formData.nombreEstudiante"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Email *</label>
              <input
                type="email"
                class="form-control"
                placeholder="correo@ejemplo.com"
                name="email"
                [(ngModel)]="formData.email"
                required
                email
              >
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Curso Seleccionado *</label>
              <select class="form-select" name="cursoId" [(ngModel)]="formData.cursoId" required>
                <option value="" disabled>Elige un curso disponible...</option>
                <option *ngFor="let curso of cursos()" [value]="curso.id">{{ curso.nombre }}</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Modalidad *</label>
              <div class="d-flex gap-4">
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="modalidad"
                    id="modOnline"
                    value="Online"
                    [(ngModel)]="formData.modalidad"
                  >
                  <label class="form-check-label" for="modOnline">Online</label>
                </div>
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="modalidad"
                    id="modPresencial"
                    value="Presencial"
                    [(ngModel)]="formData.modalidad"
                  >
                  <label class="form-check-label" for="modPresencial">Presencial</label>
                </div>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Comentarios (Opcional)</label>
              <textarea
                class="form-control"
                rows="3"
                placeholder="Â¿AlgÃºn comentario extra?"
                name="comentarios"
                [(ngModel)]="formData.comentarios"
              ></textarea>
            </div>

            @if (cargandoCursos()) {
              <div class="text-center mb-3">
                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                <span class="ms-2 text-muted">Cargando cursos disponibles...</span>
              </div>
            }

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" [disabled]="enviando() || cargandoCursos()">
              {{ enviando() ? 'Registrando...' : 'Confirmar InscripciÃ³n' }}
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

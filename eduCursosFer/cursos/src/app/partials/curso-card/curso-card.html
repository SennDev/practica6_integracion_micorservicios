<div class="card h-100 border-0 shadow-sm hover-card">
  <img [src]="curso.imagenUrl" class="card-img-top" alt="Imagen del curso">
  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between mb-2">
      <span class="badge" [ngClass]="curso.modalidad === 'Online' ? 'bg-primary' : 'bg-success'">{{ curso.modalidad }}</span>
      <span class="badge bg-secondary">{{ curso.nivel }}</span>
    </div>
    <h5 class="card-title fw-bold">{{ curso.nombre }}</h5>
    <p class="card-text text-muted small mb-2">{{ curso.categoria }}</p>
    <p class="card-text text-muted small"><i class="bi bi-clock me-1"></i> {{ curso.duracion }}</p>
    <a [routerLink]="['/curso', curso.id]" class="btn btn-outline-dark mt-auto w-100">Ver detalle</a>
  </div>
</div>

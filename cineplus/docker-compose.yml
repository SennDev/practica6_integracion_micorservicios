      - purchases_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cineplus -d purchases_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  movies_data:
  showtimes_data:
  seats_data:
  purchases_data:

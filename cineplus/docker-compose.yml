services:
  frontend:
    build: ./frontend
    container_name: cineplus-frontend
    ports:
      - "8080:80"
    depends_on:
      - movies-service
      - showtimes-service
      - seats-service
      - purchases-service

  movies-service:
    build: ./services/movies-service
    container_name: cineplus-movies-service
    environment:
      PORT: 3000
      DB_HOST: movies-db
      DB_PORT: 5432
      DB_NAME: movies_db
      DB_USER: cineplus
      DB_PASSWORD: cineplus
    depends_on:
      movies-db:
        condition: service_healthy

  movies-db:
    image: postgres:16-alpine
    container_name: cineplus-movies-db
    environment:
      POSTGRES_DB: movies_db
      POSTGRES_USER: cineplus
      POSTGRES_PASSWORD: cineplus
    volumes:
      - movies_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cineplus -d movies_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  showtimes-service:
    build: ./services/showtimes-service
    container_name: cineplus-showtimes-service
    environment:
      PORT: 3000
      DB_HOST: showtimes-db
      DB_PORT: 5432
      DB_NAME: showtimes_db
      DB_USER: cineplus
      DB_PASSWORD: cineplus

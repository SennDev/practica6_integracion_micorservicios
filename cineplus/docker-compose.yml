      DB_USER: cineplus
      DB_PASSWORD: cineplus
    depends_on:
      seats-db:
        condition: service_healthy

  seats-db:
    image: postgres:16-alpine
    container_name: cineplus-seats-db
    environment:
      POSTGRES_DB: seats_db
      POSTGRES_USER: cineplus
      POSTGRES_PASSWORD: cineplus
    volumes:
      - seats_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cineplus -d seats_db"]
      interval: 5s

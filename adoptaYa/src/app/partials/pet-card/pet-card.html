<div class="card h-100 shadow-sm hover-card border-0">
  <img
    [src]="pet.imagen"
    [alt]="pet.nombre"
    class="card-img-top pet-card-image"
    loading="lazy"
  />
  <div class="card-body d-flex flex-column">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h5 class="card-title mb-0 fw-bold">{{ pet.nombre }}</h5>
      <span [class]="'badge rounded-pill ' + getSizeBadgeClass(pet.tamano)">
        {{ pet.tamano }}
      </span>
    </div>

    <div class="mb-2">
      <small class="text-muted">
        <i class="bi bi-paw-fill me-1"></i>
        {{ pet.especie }} • {{ pet.edad }} años
      </small>
    </div>

    <p class="card-text flex-grow-1 text-muted small">
      {{ pet.descripcion }}
    </p>

    <a
      [routerLink]="['/detalle', pet.id]"
      class="btn btn-primary w-100 mt-2 d-flex align-items-center justify-content-center gap-2"
    >
      <i class="bi bi-info-circle"></i>
      Ver Detalles
    </a>
  </div>
</div>

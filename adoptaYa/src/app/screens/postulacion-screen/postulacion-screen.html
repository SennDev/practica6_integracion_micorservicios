<div class="container my-5 animate-fadeIn">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="text-center mb-4">
        <i class="bi bi-file-earmark-text display-1 text-primary"></i>
        <h1 class="mt-3 fw-bold">Formulario de Adopción</h1>
        <p class="text-muted">Completa tu solicitud para iniciar el proceso</p>
      </div>

      @if (showSuccess()) {
      <div class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <strong>¡Éxito!</strong> Postulación enviada correctamente.
        <button type="button" class="btn-close" (click)="showSuccess.set(false)"></button>
      </div>
      }

      @if (showError()) {
      <div class="alert alert-warning alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <strong>Error:</strong> {{ errorMessage() }}
        <button type="button" class="btn-close" (click)="showError.set(false)"></button>
      </div>
      }

      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
          <form (ngSubmit)="handleSubmit()" #postForm="ngForm">

            <div class="mb-4">
              <label class="form-label fw-semibold"><i class="bi bi-person-fill me-2"></i>Nombre Completo *</label>
              <input type="text" class="form-control form-control-lg" name="fullName" [(ngModel)]="formData().fullName"
                required placeholder="Ej: Juan Pérez">
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold"><i class="bi bi-envelope-fill me-2"></i>Correo Electrónico *</label>
              <input type="email" class="form-control form-control-lg" name="email" [(ngModel)]="formData().email"
                required placeholder="tu@email.com">
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold"><i class="bi bi-heart-fill me-2"></i>Mascota *</label>
              <select class="form-select form-select-lg" name="petId" [(ngModel)]="formData().petId" required>
                <option value="">Selecciona una mascota</option>
                @for (pet of petsData; track pet.id) {
                <option [value]="pet.id">{{ pet.nombre }} - {{ pet.especie }}</option>
                }
              </select>

              @if (selectedPet()) {
              <div class="mt-2 p-2 bg-light rounded small text-muted">
                <i class="bi bi-info-circle me-1"></i>
                Seleccionaste a <strong>{{ selectedPet()?.nombre }}</strong>
              </div>
              }
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold"><i class="bi bi-chat-left-text-fill me-2"></i>Experiencia *</label>
              <textarea class="form-control" name="experience" [(ngModel)]="formData().experience" rows="5" required
                minlength="50" placeholder="Cuéntanos sobre ti..."></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold"><i class="bi bi-house-fill me-2"></i>Evidencia del Hogar (URL)
                *</label>
              <input type="url" class="form-control form-control-lg" name="homeEvidence"
                [(ngModel)]="formData().homeEvidence" required placeholder="https://drive.google.com/...">
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg" [disabled]="isSubmitting() || !postForm.valid">
                @if (isSubmitting()) {
                <span class="spinner-border spinner-border-sm me-2"></span>Enviando...
                } @else {
                <i class="bi bi-send-fill me-2"></i>Enviar Postulación
                }
              </button>

              <button type="button" class="btn btn-outline-secondary" (click)="router.navigate(['/'])">
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
